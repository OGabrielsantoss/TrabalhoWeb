<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testemunhos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>
<body>

    <div class="container">
        <h1>O que nossos clientes dizem</h1>

        <div class="testemunho">
            <img class="imagens" src="maria.png" alt="Cliente">
            <h3>Maria Silva</h3>
            <blockquote>
                Produto excelente! Superou minhas expectativas e chegou muito rápido.
            </blockquote>
        </div>

        <div class="testemunho">
            <img class="imagens" src="joao.png" alt="Cliente">
            <h3>João Souza</h3>
            <blockquote>
                Atendimento incrível e qualidade impecável. Recomendo muito!
            </blockquote>
        </div>

        <div class="testemunho">
            <img class="imagens" src="ana.png" alt="Cliente">
            <h3>Ana Oliveira</h3>
            <blockquote>
                Já comprei várias vezes e sempre fico satisfeita. Vale muito a pena!
            </blockquote>
        </div>

    </div>

</body>
</html>
