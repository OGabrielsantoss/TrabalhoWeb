<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <title>Tarefas</title>
</head>
<body>

    <div class="todo-card">
        <h2 class="titulo">Tarefas</h2>

        <div class="add-section">
            <input type="text" placeholder="Inserir tarefa...">
            <button class="btn-add">Adicionar</button>
        </div>

        <ul class="task-list">
            <li>
                <input type="checkbox" id="task1">
                <label for="task1">Estudar HTML e CSS</label>
                <div class="actions">
                    <button class="btn-edit">Editar</button>
                    <button class="btn-delete">Excluir</button>
                </div>
            </li>

            <li class="done">
                <input type="checkbox" id="task2" checked>
                <label for="task2">Comprar café</label>
                <div class="actions">
                    <button class="btn-edit">Editar</button>
                    <button class="btn-delete">Excluir</button>
                </div>
            </li>
        </ul>
    </div>

</body>
</html>
